<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face{font-family:'Instrument Serif';font-style:normal;font-weight:400;
  src:url('/fonts/instrument-serif-400.woff2') format('woff2')}
@font-face{font-family:'Instrument Serif';font-style:italic;font-weight:400;
  src:url('/fonts/instrument-serif-400italic.woff2') format('woff2')}
@font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;
  src:url('/fonts/jetbrains-mono-400.woff2') format('woff2')}
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#070d1a;overflow:hidden;position:relative;
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:26px;
  font-family:system-ui}
.glow{position:absolute;inset:0;
  background:radial-gradient(700px 420px at 50% 42%, rgba(242,169,60,.14), transparent 65%),
             radial-gradient(900px 500px at 80% -10%, rgba(92,214,232,.08), transparent 60%)}
.pfp{position:relative;width:132px;height:132px;border-radius:50%;
  border:1px solid rgba(242,169,60,.55);
  box-shadow:0 0 34px rgba(242,169,60,.4), 0 0 90px rgba(92,214,232,.15)}
.eyebrow{position:relative;font-family:'JetBrains Mono',monospace;font-size:17px;
  letter-spacing:.32em;color:#f2a93c;text-transform:uppercase}
h1{position:relative;font-family:'Instrument Serif',serif;font-weight:400;font-size:110px;
  line-height:1;color:#e9e7e0}
h1 em{font-style:italic;color:#ffd28a;
  text-shadow:0 0 26px rgba(242,169,60,.55), 0 0 70px rgba(242,169,60,.25)}
.sub{position:relative;font-family:'JetBrains Mono',monospace;font-size:16px;
  letter-spacing:.14em;color:#8fa0bf}
.sub b{color:#5cd6e8;font-weight:400}
</style>
</head>
<body>
  <div class="glow"></div>
  <img class="pfp" src="/pfp.jpg">
  <div class="eyebrow">Ethereum · Smart Contracts · Since 2017</div>
  <h1>William <em>Schwab</em></h1>
  <div class="sub">smart contracts · engineering leadership · <b>wschwab.xyz</b></div>
</body>
</html>
